name: Build documentation

on:
# If specified, the workflow will be triggered automatically once you push to the `main` branch.
# Replace `main` with your branch’s name
  push:
    branches: ["main","master"]
# Specify to run a workflow manually from the Actions tab on GitHub
  workflow_dispatch:

# Gives the workflow permissions to clone the repo and create a page deployment
permissions:
  contents: read
  id-token: write
  pages: write
  
env:
  # Name of module and id separated by a slash
  INSTANCE: Writerside/hi
  # Set to true if the instance is a group, false otherwise
  IS_GROUP: false
  # Replace HI with the ID of the instance in capital letters
  ARTIFACT: webHelpHI2-all.zip
  # Writerside docker image version
  DOCKER_VERSION: '2026.04.8711'
  # Add the variable below to upload Algolia indexes
  # Replace HI with the ID of the instance in capital letters
  ALGOLIA_ARTIFACT: 'algolia-indexes-HI.zip'
  ALGOLIA_APP_NAME: '8VA5LCDZGD'
  ALGOLIA_INDEX_NAME: 'Default'
  ALGOLIA_KEY: '${{ secrets.ALGOLIA_KEY }}'
  # Keep the docs builder pinned, but follow JetBrains' current recommendation for the publisher image.
  ALGOLIA_PUBLISHER_IMAGE: 'registry.jetbrains.team/p/writerside/builder/algolia-publisher:latest'
  CONFIG_JSON_PRODUCT: 'writerside'
  CONFIG_JSON_VERSION: 'master'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Build docs using Writerside Docker builder
        uses: JetBrains/writerside-github-action@v4
        with:
          instance: ${{ env.INSTANCE }}
          artifact: ${{ env.ARTIFACT }}
          docker-version: ${{ env.DOCKER_VERSION }}

      - name: Normalize Algolia indexes for publisher
        run: |
          rm -rf algolia-indexes
          unzip -O UTF-8 -qq "artifacts/${{ env.ALGOLIA_ARTIFACT }}" -d algolia-indexes
          find algolia-indexes -type f -name '*.json' -print0 | while IFS= read -r -d '' file; do
            tmp="${file}.tmp"
            jq 'del(.contentBoost)' "$file" > "$tmp"
            mv "$tmp" "$file"
          done
          (
            cd algolia-indexes
            zip -X -qr "../${{ env.ALGOLIA_ARTIFACT }}" .
          )
          mv "${{ env.ALGOLIA_ARTIFACT }}" "artifacts/${{ env.ALGOLIA_ARTIFACT }}"
          rm -rf algolia-indexes
      
      - name: Save artifact with build results
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: |
            artifacts/${{ env.ARTIFACT }}
            artifacts/report.json
            artifacts/${{ env.ALGOLIA_ARTIFACT }}
          retention-days: 7
# Add the job below and artifacts/report.json on Upload documentation step above if you want to fail the build when documentation contains errors
  test:
# Requires build job results
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: artifacts
        
      - name: Test documentation
        uses: JetBrains/writerside-checker-action@v1
        with:
          instance: ${{ env.INSTANCE }}
          is-group: ${{ env.IS_GROUP }}
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Requires the build job results
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: docs
    
    - name: Unzip artifact
      run: unzip -O UTF-8 -qq "${{ env.ARTIFACT }}" -d dir

    - name: Add root site metadata
      run: |
        mkdir -p dir/images
        cp robots.txt dir/robots.txt
        cp CNAME dir/CNAME
        cp Writerside/images/og-image.png dir/images/og-image.png

    - name: Normalize SEO metadata
      run: |
        python3 <<'PY'
        from pathlib import Path
        import html
        import json
        import re
        import textwrap

        SITE_URL = "https://jakeuj.com/"
        TARGET_URL = "https://jakeuj.com/default.html"
        OG_IMAGE = "https://jakeuj.com/images/og-image.png"
        DEFAULT_TITLE = "Jakeuj 筆記本 | Jakeuj's Notes"
        DEFAULT_DESCRIPTION = "Jakeuj 筆記本整理 .NET、ABP、Azure、GCP、Docker、AI 工具、macOS 與開發環境疑難排解，提供可公開查閱的實作筆記與排錯紀錄。"

        def attr_escape(value):
            return html.escape(value, quote=True)

        def extract(pattern, text, default=""):
            match = re.search(pattern, text, re.DOTALL)
            return html.unescape(match.group(1)) if match else default

        def normalize_language(text):
            updated = re.sub(r'<html lang="[^"]+"', '<html lang="zh-TW"', text, count=1)
            updated = re.sub(
                r'(<meta property="og:locale" content=")[^"]*(">)',
                r'\1zh_TW\2',
                updated,
                count=1,
            )
            updated = re.sub(
                r'("inLanguage"\s*:\s*)"[^"]*"',
                r'\1"zh-TW"',
                updated,
            )
            return updated

        patched = 0
        for page in sorted(Path("dir").glob("*.html")):
            text = page.read_text(encoding="utf-8")
            match = re.search(r'<meta name="description" content="([^"]+)">', text)
            updated = normalize_language(text)

            if match:
                description_attr = match.group(1)
                description_json = json.dumps(html.unescape(description_attr), ensure_ascii=False)

                updated = re.sub(
                    r'(<meta property="og:description" content=")[^"]*(">)',
                    lambda m: f"{m.group(1)}{description_attr}{m.group(2)}",
                    updated,
                    count=1,
                )
                updated = re.sub(
                    r'(<meta name="twitter:description" content=")[^"]*(">)',
                    lambda m: f"{m.group(1)}{description_attr}{m.group(2)}",
                    updated,
                    count=1,
                )
                updated = re.sub(
                    r'("description":\s*)""',
                    lambda m: f"{m.group(1)}{description_json}",
                    updated,
                    count=1,
                )

            if updated != text:
                page.write_text(updated, encoding="utf-8")
                patched += 1

        default_page = Path("dir/default.html")
        index_page = Path("dir/index.html")
        if default_page.exists():
            default_html = default_page.read_text(encoding="utf-8")
            title = extract(r"<title>(.*?)</title>", default_html, DEFAULT_TITLE)
            description = extract(
                r'<meta name="description" content="([^"]*)">',
                default_html,
                DEFAULT_DESCRIPTION,
            ) or DEFAULT_DESCRIPTION
            image = extract(
                r'<meta property="og:image" content="([^"]*)">',
                default_html,
                OG_IMAGE,
            ) or OG_IMAGE
            schema = {
                "@context": "http://schema.org",
                "@type": "WebPage",
                "@id": f"{TARGET_URL}#webpage",
                "url": TARGET_URL,
                "name": title,
                "description": description,
                "image": image,
                "inLanguage": "zh-TW",
            }
            website_schema = {
                "@context": "http://schema.org",
                "@type": "WebSite",
                "@id": f"{SITE_URL}#website",
                "url": SITE_URL,
                "name": "Jakeuj's Notes Help",
                "inLanguage": "zh-TW",
            }
            index_page.write_text(
                textwrap.dedent(f"""\
                    <!DOCTYPE html>
                    <html lang="zh-TW">
                    <head>
                    <meta charset="UTF-8">
                    <title>{attr_escape(title)}</title>
                    <meta name="description" content="{attr_escape(description)}">
                    <link rel="canonical" href="{TARGET_URL}">
                    <meta http-equiv="refresh" content="0; url=default.html">
                    <meta name="image" content="{attr_escape(image)}">
                    <meta property="og:title" content="{attr_escape(title)}">
                    <meta property="og:description" content="{attr_escape(description)}">
                    <meta property="og:image" content="{attr_escape(image)}">
                    <meta property="og:site_name" content="Jakeuj's Notes Help">
                    <meta property="og:type" content="website">
                    <meta property="og:locale" content="zh_TW">
                    <meta property="og:url" content="{TARGET_URL}">
                    <meta name="twitter:card" content="summary_large_image">
                    <meta name="twitter:site" content="@jakeuj">
                    <meta name="twitter:title" content="{attr_escape(title)}">
                    <meta name="twitter:description" content="{attr_escape(description)}">
                    <meta name="twitter:creator" content="@jakeuj">
                    <meta name="twitter:image:src" content="{attr_escape(image)}">
                    <script type="application/ld+json">{json.dumps(schema, ensure_ascii=False)}</script>
                    <script type="application/ld+json">{json.dumps(website_schema, ensure_ascii=False)}</script>
                    </head>
                    <body>
                    <h1>Redirecting...</h1>
                    <a href="default.html">Click here if you are not redirected.</a>
                    <script>location = "default.html"</script>
                    </body>
                    </html>
                    """),
                encoding="utf-8",
            )
            patched += 1

        print(f"Patched SEO metadata in {patched} HTML files")
        PY

    - name: Validate Pages artifact SEO metadata
      run: |
        for file in dir/sitemap.xml dir/robots.txt dir/CNAME dir/images/og-image.png dir/index.html dir/default.html dir/writerside-sitemap-seo.html; do
          if [ ! -f "$file" ]; then
            echo "::error file=$file::required Pages artifact file is missing"
            exit 1
          fi
        done

        if grep -q "/writerside/master/" dir/sitemap.xml; then
          echo "::error file=dir/sitemap.xml::sitemap.xml still contains /writerside/master/ URLs"
          exit 1
        fi

        if ! grep -q "<loc>https://jakeuj.com/" dir/sitemap.xml; then
          echo "::error file=dir/sitemap.xml::sitemap.xml does not contain root jakeuj.com URLs"
          exit 1
        fi

        if ! grep -q "Sitemap: https://jakeuj.com/sitemap.xml" dir/robots.txt; then
          echo "::error file=dir/robots.txt::robots.txt is missing the sitemap directive"
          exit 1
        fi

        seo_pages=(
          dir/index.html
          dir/default.html
          dir/writerside-sitemap-seo.html
          dir/share-wifi.html
          dir/docker.html
          dir/ai-search-service.html
          dir/deploy-fastapi-on-azure-app-service.html
          dir/flutter-azure-ad-login.html
          dir/cloudwatch.html
          dir/abp.html
          dir/studio.html
          dir/swagger.html
          dir/ollama.html
          dir/powershell-script-tool-for-migrations.html
        )

        for page in "${seo_pages[@]}"; do
          if [ ! -f "$page" ]; then
            echo "::error file=$page::SEO validation page is missing"
            exit 1
          fi

          if ! grep -Eq 'name="description" content="[^"]+' "$page"; then
            echo "::error file=$page::meta description is empty or missing"
            exit 1
          fi

          if ! grep -Eq 'property="og:description" content="[^"]+' "$page"; then
            echo "::error file=$page::og:description is empty or missing"
            exit 1
          fi

          if ! grep -Eq 'name="twitter:description" content="[^"]+' "$page"; then
            echo "::error file=$page::twitter:description is empty or missing"
            exit 1
          fi

          if grep -q '"description": ""' "$page"; then
            echo "::error file=$page::Schema description is empty"
            exit 1
          fi

          if ! grep -q "https://jakeuj.com/images/og-image.png" "$page"; then
            echo "::error file=$page::page does not reference the PNG OG image"
            exit 1
          fi

          if ! grep -q '<html lang="zh-TW"' "$page"; then
            echo "::error file=$page::html lang is not zh-TW"
            exit 1
          fi

          if ! grep -q 'property="og:locale" content="zh_TW"' "$page"; then
            echo "::error file=$page::og:locale is not zh_TW"
            exit 1
          fi

          if grep -Eq '"inLanguage"[[:space:]]*:[[:space:]]*"en-US"' "$page"; then
            echo "::error file=$page::Schema inLanguage is still en-US"
            exit 1
          fi
        done
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Package and upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: dir
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
  publish-indexes:
    needs: [build, test, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: artifacts
      - name: Unzip Algolia artifact
        run: unzip -O UTF-8 -qq 'artifacts/${{ env.ALGOLIA_ARTIFACT }}' -d algolia-indexes

      - name: Pull Algolia publisher image
        run: |
          for attempt in 1 2 3 4 5 6; do
            if docker pull "$ALGOLIA_PUBLISHER_IMAGE"; then
              exit 0
            fi

            wait_seconds=$((attempt * 20))
            echo "::warning title=Algolia publisher image pull failed::Attempt ${attempt} failed; retrying in ${wait_seconds}s."
            sleep "$wait_seconds"
          done

          echo "::error::Unable to pull $ALGOLIA_PUBLISHER_IMAGE after 6 attempts."
          exit 1

      - name: Update Algolia index
        run: |
          if [ -z "$ALGOLIA_KEY" ]; then
            echo "ALGOLIA_KEY secret is not set in GitHub Secrets"
            exit 1
          fi

          docker run --rm \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e ALGOLIA_KEY \
            -e ALGOLIA_APP_NAME \
            -e ALGOLIA_INDEX_NAME \
            -e CONFIG_JSON_PRODUCT \
            -e CONFIG_JSON_VERSION \
            "$ALGOLIA_PUBLISHER_IMAGE" \
            sh -c 'env "algolia-key=$ALGOLIA_KEY" java -jar /opt/builder/help-publication-agent.jar \
              update-index \
              --application-name "$ALGOLIA_APP_NAME" \
              --index-name "$ALGOLIA_INDEX_NAME" \
              --product "$CONFIG_JSON_PRODUCT" \
              --version "$CONFIG_JSON_VERSION" \
              --index-directory algolia-indexes/ \
              2>&1 | tee algolia-update-index-log.txt'
